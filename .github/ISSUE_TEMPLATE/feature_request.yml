name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for UniBridge? Describe it below. Please note that opening an issue does not guarantee it will be accepted — we'll discuss it first.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that isn't possible or is harder than it should be?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you think this should work? Include API examples, CLI commands, or UI sketches if applicable.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider? Why didn't they work for you?
    validations:
      required: false

  - type: checkboxes
    id: component
    attributes:
      label: Which component would this affect?
      options:
        - label: SDK (@unibridge/sdk)
        - label: CLI (@unibridge/cli)
        - label: Unity Plugin

  - type: dropdown
    id: willing-to-implement
    attributes:
      label: Would you be willing to implement this?
      description: If approved, would you want to submit a PR? (No pressure either way.)
      options:
        - "Yes"
        - "No"
        - "Maybe, with guidance"
    validations:
      required: true
