name: Bug Report
description: Report a bug in Scenic
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the details below so we can investigate.

  - type: input
    id: unity-version
    attributes:
      label: Unity Version
      placeholder: "e.g. 2022.3.20f1"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      placeholder: "e.g. 22.18.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true

  - type: checkboxes
    id: component
    attributes:
      label: Which component is affected?
      options:
        - label: SDK (@scenicai/sdk)
        - label: CLI (@scenicai/cli)
        - label: Unity Plugin

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: What did you do? Be as specific as possible.
      placeholder: |
        1. Connected to Unity project with...
        2. Ran command...
        3. Observed...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste any relevant error messages, stack traces, or screenshots.
      render: shell
    validations:
      required: false
