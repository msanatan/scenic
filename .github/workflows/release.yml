name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: Version bump type
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      prerelease:
        description: Mark GitHub Release as pre-release
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Bump, tag, and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org
      
      # Install latest NPM to use Trusted Publishing feature
      - run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: npm run bump -- ${{ github.event.inputs.bump_type }}

      - name: Read new version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit version changes
        run: |
          git add package.json package-lock.json packages/*/package.json unity/package.json
          git commit -m "chore(release): v${{ steps.version.outputs.value }}"

      - name: Create and push tag
        run: |
          git tag "v${{ steps.version.outputs.value }}"
          git push origin HEAD
          git push origin "v${{ steps.version.outputs.value }}"

      - name: Build packages
        run: npm run build

      - name: Validate npm publish artifacts
        run: |
          SDK_PACK_JSON=$(npm pack --dry-run --json --workspace=@unibridge/sdk)
          CLI_PACK_JSON=$(npm pack --dry-run --json --workspace=@unibridge/cli)

          SDK_PACK_JSON="$SDK_PACK_JSON" node -e "const pack = JSON.parse(process.env.SDK_PACK_JSON)[0]; if (!pack.files.some((file) => file.path === 'dist/index.js')) { throw new Error('@unibridge/sdk tarball missing dist/index.js'); }"
          CLI_PACK_JSON="$CLI_PACK_JSON" node -e "const pack = JSON.parse(process.env.CLI_PACK_JSON)[0]; if (!pack.files.some((file) => file.path === 'dist/index.js')) { throw new Error('@unibridge/cli tarball missing dist/index.js'); }"

      - name: Publish SDK to npm
        run: npm publish --workspace=@unibridge/sdk --access public

      - name: Publish CLI to npm
        run: npm publish --workspace=@unibridge/cli --access public

      - name: Create GitHub release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.value }}"
          if [ "${{ github.event.inputs.prerelease }}" = "true" ]; then
            gh release create "$TAG" --title "$TAG" --generate-notes --prerelease
          else
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi
